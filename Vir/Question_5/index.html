<!DOCTYPE html>
<html>
<head>
    <title>Theatre Booking</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fce4ec; padding: 30px 15px; }
        #bookingForm { background-color: white; max-width: 450px; margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: background-color 0.5s ease; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; color: #555; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 48%; padding: 10px; margin-top: 5px; margin-bottom: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; display: inline-block; box-sizing: border-box; }
        .btn-add { background-color: #008CBA; }
        .btn-add:hover { background-color: #007399; }
        .btn-del { background-color: #f44336; }
        .btn-del:hover { background-color: #da190b; }
        .divider { height: 1px; background-color: #ddd; margin: 15px 0; }
        #finalPayable { font-size: 18px; text-align: center; background: #333; color: #fff; padding: 15px; border-radius: 6px; }
    </style>
</head>
<body>
    <div id="bookingForm">
        <h2>Theatre Seat Booking</h2>
        
        <label for="tickets">Number of Tickets:</label>
        <input type="number" id="tickets" placeholder="No. of tickets" value="1" min="1" onchange="updateTotal()">
        
        <label for="seatType">Select Seat Type:</label>
        <select id="seatType" onchange="handleSeatChange()">
            <option value="120">Silver - ₹120</option>
            <option value="180">Gold - ₹180</option>
            <option value="250">Platinum - ₹250</option>
        </select>
        
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-del" style="width: 100%;" onclick="deleteSeatType()">Delete Selected Seat Type</button>
        </div>
        
        <div class="divider"></div>
        
        <label>Add New Seat Type:</label>
        <input type="text" id="newSeatName" placeholder="New Seat Name (e.g. VIP)">
        <input type="number" id="newSeatPrice" placeholder="New Seat Price (₹)">
        <button class="btn-add" style="width: 100%;" onclick="addSeatType()">+ Add Custom Seat Type</button>
        
        <div class="divider"></div>
        
        <div id="finalPayable"></div>
        
        <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 0;">* 5% discount applied on 5 or more tickets!</p>
    </div>

    <script>
        function validateTickets(t) {
            return t >= 1;
        }

        function handleSeatChange() {
            let seatType = document.getElementById('seatType');
            let form = document.getElementById('bookingForm');
            
            if (seatType.selectedIndex === -1) {
                form.style.backgroundColor = 'white';
                updateTotal();
                return;
            }

            let text = seatType.options[seatType.selectedIndex].text;
            
            if (text.includes('Silver')) {
                form.style.backgroundColor = '#ffcccc'; // lighter red
            } else if (text.includes('Gold')) {
                form.style.backgroundColor = '#fff2cc'; // lighter yellow
            } else if (text.includes('Platinum')) {
                form.style.backgroundColor = '#d9ead3'; // lighter green
            } else {
                form.style.backgroundColor = 'white';
            }
            
            updateTotal();
        }

        function updateTotal() {
            let t = parseInt(document.getElementById('tickets').value);
            if (!validateTickets(t) || isNaN(t)) {
                // Don't alert continuously, just set to 0
                document.getElementById('finalPayable').innerHTML = "Invalid Ticket Count";
                return;
            }
            
            let select = document.getElementById('seatType');
            if(select.selectedIndex === -1) {
                document.getElementById('finalPayable').innerHTML = "No seat type available";
                return;
            }
            
            let price = parseFloat(select.value);
            if(isNaN(price)) return;

            let cost = t * price;
            if (t >= 5) {
                cost -= (cost * 0.05);
            }
            
            document.getElementById('finalPayable').innerHTML = "Final Payable: ₹" + cost.toFixed(2);
        }

        function addSeatType() {
            let name = document.getElementById('newSeatName').value;
            let price = document.getElementById('newSeatPrice').value;
            
            if (name && price && parseFloat(price) > 0) {
                let select = document.getElementById('seatType');
                let opt = document.createElement('option');
                opt.value = price;
                opt.text = name + " - ₹" + price;
                select.add(opt);
                
                document.getElementById('newSeatName').value = '';
                document.getElementById('newSeatPrice').value = '';
                alert("New seat type added!");
                
                if(select.options.length === 1) {
                    handleSeatChange();
                }
            } else {
                alert("Please enter a valid name and price.");
            }
        }

        function deleteSeatType() {
            let select = document.getElementById('seatType');
            if (select.selectedIndex >= 0) {
                select.remove(select.selectedIndex);
                handleSeatChange();
            } else {
                alert("No seat type to delete!");
            }
        }
        
        window.onload = handleSeatChange;
    </script>
</body>
</html>
