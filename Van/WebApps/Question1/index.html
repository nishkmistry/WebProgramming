<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Parking</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { text-align: center; color: #4CAF50; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; }
        button:hover { background: #45a049; }
        .slot { display: inline-block; width: 40px; height: 40px; border: 1px solid #aaa; margin: 5px; text-align: center; cursor: pointer; line-height: 40px; border-radius: 4px; font-weight: bold; }
        .disabled { background-color: #f44336; color: white; cursor: not-allowed; border-color: #d32f2f; }
        .selected { background-color: #4CAF50; color: white; border-color: #388E3C; }
        #slotsContainer { text-align: center; margin-bottom: 20px; }
        #summarySection { background: #e8f5e9; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: left; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Smart Parking Reservation</h2>
        <img src="https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=800&q=80" alt="Parking" class="header-img">
        
        <form id="parkingForm">
            <label>Driver Name:</label>
            <input type="text" id="driverName" placeholder="Enter full name" required>

            <label>Vehicle Number:</label>
            <input type="text" id="vehicleNum" placeholder="e.g., TN00AA0000" required>

            <label>Phone Number:</label>
            <input type="text" id="phoneNum" placeholder="10-digit number" required>

            <label>Vehicle Type:</label>
            <select id="vehicleType">
                <option value="Two-Wheeler">Two-Wheeler</option>
                <option value="Car">Car</option>
                <option value="SUV">SUV</option>
            </select>

            <label>Duration (Hours):</label>
            <input type="number" id="duration" min="1" placeholder="Hours" required>

            <label>Arrival Time (24hr):</label>
            <input type="time" id="time" required>

            <button type="button" onclick="validateAndLoad()">Next</button>
        </form>

        <div id="slotsSection" style="display:none;">
            <h3 style="text-align: center;">Select Your Slots</h3>
            <div id="slotsContainer"></div>
            <button type="button" onclick="confirmBooking()">Confirm Booking</button>
        </div>

        <div id="summarySection" style="display:none;"></div>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Override confirmBooking to handle summary display properly with styles
        const originalConfirm = confirmBooking;
        confirmBooking = function() {
            originalConfirm();
            if (selectedSlots.length > 0) {
                document.getElementById('summarySection').style.display = 'block';
            }
        };
    </script>
</body>
</html>
