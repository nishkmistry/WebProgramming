<!DOCTYPE html>
<html>
<head>
    <title>Flight Seat Reservation</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #e0f2f1; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; color: #00796b; margin-top: 0; }
        .header-img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; border-bottom: 4px solid #00796b; }
        
        label { font-weight: bold; color: #333; display: block; margin-top: 10px; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #b2dfdb; border-radius: 4px; box-sizing: border-box; background: #f1f8f8; }
        input:focus { border-color: #00796b; outline: none; }
        button { background: #00796b; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #004d40; }
        
        .seat-map-container { text-align: center; margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; display: none; }
        .seat { width: 35px; height: 35px; border: 2px solid #00796b; border-radius: 8px 8px 0 0; display: inline-block; margin: 4px; text-align: center; cursor: pointer; line-height: 35px; background: white; font-weight: bold; color: #00796b; transition: 0.2s; }
        .seat:hover:not(.booked) { background: #b2dfdb; }
        .booked { background: #bdbdbd; border-color: #9e9e9e; color: #fff; pointer-events: none; }
        .selected { background: #00796b; color: white; border-color: #004d40; }
        
        h3 { color: #004d40; border-bottom: 2px solid #b2dfdb; display: inline-block; padding-bottom: 5px; }
        
        #ticketOutput { margin-top: 20px; padding: 20px; background: #e0f2f1; border-radius: 8px; border: 2px dashed #00796b; display: none; }
        .ticket-header { text-align: center; font-size: 20px; font-weight: bold; color: #004d40; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>AeroFly Reservations</h2>
        <img src="https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80" alt="Airplane" class="header-img">
        
        <form id="flightForm">
            <label>Passenger Name</label>
            <input type="text" id="fName" placeholder="Full name (min 5 chars)" required>
            
            <label>Passport Number</label>
            <input type="text" id="fPassport" placeholder="8-10 alphanumeric characters" required>
            
            <label>Email Address</label>
            <input type="email" id="fEmail" placeholder="e.g., mail@example.com" required>
            
            <label>Phone Number</label>
            <input type="text" id="fPhone" placeholder="10-digit number" required>
            
            <label>Date of Journey</label>
            <input type="date" id="fDate" required>
            
            <button type="button" id="btnShowSeats" onclick="validate()">Select Seats</button>
        </form>
        
        <div id="seatMap" class="seat-map-container"></div>
        <div id="ticketOutput"></div>
    </div>

    <script>
        const preBookedSeats = [5, 12, 38, 45, 2, 8]; 
        let chosenSeats = [];

        function validate() {
            const name = document.getElementById('fName').value;
            const pass = document.getElementById('fPassport').value;
            const email = document.getElementById('fEmail').value;
            const phone = document.getElementById('fPhone').value;
            const date = document.getElementById('fDate').value;

            if (name.length < 5) return alert("Name must have minimum 5 characters.");
            if (!/^[A-Za-z0-9]{8,10}$/.test(pass)) return alert("Passport number must contain 8–10 alphanumeric characters.");
            if (!/^\S+@\S+\.\S+$/.test(email)) return alert("Invalid email address.");
            if (!/^\d{10}$/.test(phone)) return alert("Phone number must contain exactly 10 digits.");
            if (!date) return alert("Please select a date of journey.");

            document.getElementById('flightForm').style.display = 'none';
            document.getElementById('seatMap').style.display = 'block';
            renderSeats();
        }

        function renderSeats() {
            const map = document.getElementById('seatMap');
            map.innerHTML = '<h3>Economy Class (Seats 1-36)</h3><br>';
            
            for(let i=1; i<=48; i++) {
                if (i === 37) map.innerHTML += '<br><br><h3>Business Class (Seats 37-48)</h3><br>';
                
                const seat = document.createElement('div');
                seat.className = 'seat';
                seat.innerText = i;
                
                if(preBookedSeats.includes(i)) {
                    seat.classList.add('booked');
                    seat.title = "Already Booked";
                } else {
                    seat.onclick = () => selectSeat(seat, i);
                    seat.title = "Seat " + i;
                }
                
                map.appendChild(seat);
                
                // Add an aisle gap
                if (i % 6 === 3) map.innerHTML += '<span style="display:inline-block; width:20px;"></span>';
                if (i % 6 === 0) map.innerHTML += '<br>';
            }
            map.innerHTML += '<br><button onclick="confirmFlight()">Confirm Booking & Generate Ticket</button>';
        }

        function selectSeat(element, num) {
            if (chosenSeats.includes(num)) {
                chosenSeats = chosenSeats.filter(s => s !== num);
                element.classList.remove('selected');
            } else {
                if (chosenSeats.length >= 3) return alert("Maximum 3 seats allowed per passenger.");
                chosenSeats.push(num);
                element.classList.add('selected');
            }
        }

        function confirmFlight() {
            if (chosenSeats.length === 0) return alert("Please select at least one seat to continue.");
            
            let baseCost = 0;
            chosenSeats.forEach(s => {
                if (s <= 36) baseCost += 4500; 
                else baseCost += 9000;
            });

            const dateStr = document.getElementById('fDate').value;
            const date = new Date(dateStr);
            const day = date.getDay();
            let surcharge = 0;
            
            if (day === 0 || day === 6) surcharge = baseCost * 0.10;
            
            let preTax = baseCost + surcharge;
            let tax = preTax * 0.08; 
            let total = preTax + tax;

            const ticketId = "TKT" + Math.floor(Math.random() * 100000);

            document.getElementById('seatMap').style.display = 'none';
            
            const output = document.getElementById('ticketOutput');
            output.style.display = 'block';
            output.innerHTML = `
                <div class="ticket-header">Boarding Pass Issued</div>
                <p><b>Ticket ID:</b> ${ticketId}</p>
                <p><b>Passenger Name:</b> ${document.getElementById('fName').value}</p>
                <p><b>Date of Journey:</b> ${dateStr}</p>
                <hr style="border:1px dashed #00796b;">
                <p><b>Seats Booked:</b> ${chosenSeats.join(', ')}</p>
                <p><b>Base Fare:</b> ₹${baseCost}</p>
                <p><b>Weekend Surcharge:</b> ₹${surcharge.toFixed(2)}</p>
                <p><b>Airport Tax (8%):</b> ₹${tax.toFixed(2)}</p>
                <hr style="border:1px dashed #00796b;">
                <p style="font-size: 18px;"><b>Total Fare: ₹${total.toFixed(2)}</b></p>
                <button onclick="location.reload()" style="background:#424242; margin-top:20px;">Book Another Flight</button>
            `;
        }
    </script>
</body>
</html>
